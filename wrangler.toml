# ============================================================================
# wrangler.toml  —  the settings Cloudflare reads when we deploy.
#
# Two jobs are described here:
#   1. Serve our built React website (the "dist" folder) to visitors.
#   2. Run our Worker code for any request that starts with "/api/".
# ============================================================================

name = "smartnotes"
main = "worker/index.js"            # the backend code (the API)
compatibility_date = "2025-06-01"

# --- The website (our built React app) ---
[assets]
directory = "./dist"                          # the folder Vite builds into
not_found_handling = "single-page-application" # always show our app for unknown pages
run_worker_first = ["/api/*"]                 # but let the Worker handle "/api/..." first

# --- Database (env.DB) ---
[[d1_databases]]
binding = "DB"
database_name = "smartnotes-db"
database_id = "cd597906-2c52-4b1d-95c7-72acb7386304"

# --- AI (env.AI): summaries, answers, and search "meaning" ---
[ai]
binding = "AI"

# --- Search index (env.VECTORIZE): finds notes by meaning ---
[[vectorize]]
binding = "VECTORIZE"
index_name = "smartnotes-index"

# --- Fast storage (env.CACHE): remembers the daily digest ---
[[kv_namespaces]]
binding = "CACHE"
id = "b9460fca469b4c16af77e799cfcf8c5b"

# --- Scheduled job: rebuild the digest daily at 08:00 UTC ---
[triggers]
crons = ["0 8 * * *"]
