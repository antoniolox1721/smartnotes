<!DOCTYPE html>
<!--
  index.html — the single page the browser loads first.
  It's almost empty on purpose: React fills the <div id="root"> below with
  the whole app. The <script> line tells the browser to start our React code.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartNotes — AI notes on Cloudflare</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
